version: "3.1"

services:
  aoi-ros2:
    container_name: aoi-ros2
    privileged: true  # For GPIO and to address related services with localhost
    profiles: [full]
    image: aoi-ros2:latest
    restart: always
    volumes:
      - aoi:/aoi # For production
    build:
      context: .
  aoi-mysql:
    container_name: aoi-mysql
    profiles: [infra, full]
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
      MYSQL_DATABASE: $MYSQL_DATABASE
      MYSQL_USER: $MYSQL_USER
      MYSQL_PASSWORD: $MYSQL_PASSWORD
    ports:
      - 10002:3306
  aoi-adminer:
    container_name: aoi-adminer
    profiles: [infra, full]
    image: adminer
    restart: always
    depends_on:
      - aoi-mysql
    ports:
      - 10003:8080
  aoi-minio:
    container_name: aoi-minio
    image: docker.io/minio/minio
    command: server /data --console-address ":9001"
    profiles: [infra, full]
    ports:
      - 10004:9000
      - 10005:9001
    volumes:
      - aoi:/data
    environment:
      MINIO_ROOT_USER: $MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD: $MINIO_ROOT_PASSWORD
volumes:
  aoi:
