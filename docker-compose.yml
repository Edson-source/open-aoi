version: "3.1"

services:
  aoi-ros2:
    container_name: aoi-ros2
    profiles: [inspection]
    image: aoi-ros2:latest
    restart: always
    volumes:
      - aoi:/aoi # For production
    build:
      context: .
      dockerfile: dockerfile.aoi-ros2
    ports:
      - 10001:9090 # Ros2 bridge
      - 443:443 # Ros2 bridge websocket protocol
  aoi-mysql:
    container_name: aoi-mysql
    profiles: [core, inspection]
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: $MYSQL_ROOT_PASSWORD
      MYSQL_DATABASE: $MYSQL_DATABASE
      MYSQL_USER: $MYSQL_USER
      MYSQL_PASSWORD: $MYSQL_PASSWORD
    ports:
      - 10002:3306
    env_file:
      - path: ./open_aoi_ros/.env
        required: true
  aoi-adminer:
    container_name: aoi-adminer
    profiles: [core, inspection]
    image: adminer
    restart: always
    depends_on:
      - aoi-mysql
    ports:
      - 10003:8080
    env_file:
      - path: ./open_aoi_ros/.env
        required: true
  aoi-minio:
    container_name: aoi-minio
    image: docker.io/minio/minio
    command: server /data --console-address ":9001"
    profiles: [core, inspection]
    ports:
      - 10004:9000
      - 10005:9001
    volumes:
      - aoi:/data
    environment:
      MINIO_ROOT_USER: $MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD: $MINIO_ROOT_PASSWORD
      MINIO_DEFAULT_BUCKETS: $MINIO_DEFAULT_BUCKETS
    env_file:
      - path: ./open_aoi_ros/.env
        required: true
volumes:
  aoi:
